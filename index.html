<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>CalCraft | Modern Calculator</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
/>

    <!-- Favicon (Optional) -->
    <!-- <link rel="icon" href="assets/icons/favicon.png"> -->
</head>
<body>

    <!-- ================= HEADER ================= -->
    <header class="header">
        <h1>CalCraft</h1>
    </header>

    <!-- ================= MAIN ================= -->
    <main class="calculator-container">

    <section class="calculator">

        <!-- Display -->
        <div class="display">
            <input
                type="text"
                id="display"
                placeholder="0"
                readonly
            >
        </div>

        <!-- Buttons -->
        <div class="buttons">

            <button class="btn function">AC</button>
            <button class="btn function">DEL</button>
            <button class="btn operator">%</button>
            <button class="btn operator">÷</button>

            <button class="btn number">7</button>
            <button class="btn number">8</button>
            <button class="btn number">9</button>
            <button class="btn operator">×</button>

            <button class="btn number">4</button>
            <button class="btn number">5</button>
            <button class="btn number">6</button>
            <button class="btn operator">-</button>

            <button class="btn number">1</button>
            <button class="btn number">2</button>
            <button class="btn number">3</button>
            <button class="btn operator">+</button>

            <button class="btn number">0</button>
            <button class="btn number">.</button>
            <button class="btn equal">=</button>

        </div>

    </section>

</main>

    <!-- ================= FOOTER ================= -->
    <!-- ================= FOOTER ================= -->

        <!-- Mohammed Sahil -->

            <div class="social-links">
                <a href="https://github.com/Mdsahil01" target="_blank" rel="noopener noreferrer" aria-label="Mohammed Sahil GitHub">
                    <i class="fab fa-github"></i>
                </a>

                <a href="https://www.linkedin.com/in/mdsahil01" target="_blank" rel="noopener noreferrer" aria-label="Mohammed Sahil LinkedIn">
                    <i class="fab fa-linkedin"></i>
                </a>
            </div>
        </div>

        <!-- Pavan Vastrad -->
        <div class="team-member">
            <img src="assets/images/pavan.png" alt="Pavan Vastrad">

            <h3>Pavan Vastrad</h3>

            <div class="social-links">
                <a href="https://github.com/vastradpavan88" target="_blank" rel="noopener noreferrer" aria-label="Pavan Vastrad GitHub">
                    <i class="fab fa-github"></i>
                </a>

                <a href="https://www.linkedin.com/in/pavan-vastrad/" target="_blank" rel="noopener noreferrer" aria-label="Pavan Vastrad LinkedIn">
                    <i class="fab fa-linkedin"></i>
                </a>
            </div>
        </div>

    </div>

    <p class="copyright">
        © 2026 CalCraft. Developed by Mohammed Sahil &amp; Pavan Vastrad.
    </p>

</footer>

    <!-- JavaScript -->
    <script src="js/script.js"></script>

</body>
</html>
